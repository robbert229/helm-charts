apiVersion: apps/v1beta2
kind: Deployment
metadata:
  name: {{ template "mediacenter.fullname" . }}-sonarr
  labels:
    app: {{ template "mediacenter.name" . }}
    chart: {{ template "mediacenter.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
    component: sonarr
spec:
  replicas: {{ .Values.sonarr.replicaCount }}
  selector:
    matchLabels:
      app: {{ template "mediacenter.name" . }}
      release: {{ .Release.Name }}
      component: sonarr
  template:
    metadata:
      labels:
        app: {{ template "mediacenter.name" . }}
        release: {{ .Release.Name }}
        component: sonarr
    spec:
      volumes:
{{ toYaml .Values.sonarr.volumes | indent 6 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.sonarr.image.repository }}:{{ .Values.sonarr.image.tag }}"
          imagePullPolicy: {{ .Values.sonarr.image.pullPolicy }}
          # livenessProbe:
          #   httpGet:
          #     path: /
          #     port: 7878
          #   initialDelaySeconds: 10
          #   periodSeconds: 3
          env:
{{ toYaml .Values.sonarr.env | indent 12 }}
          ports:
            - name: http
              containerPort: 8989
              protocol: TCP
          volumeMounts:
{{ toYaml .Values.sonarr.volumeMounts | indent 12 }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
    {{- with .Values.sonarr.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
    {{- end }}
    {{- with .Values.sonarr.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
    {{- end }}
    {{- with .Values.sonarr.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
    {{- end }}
